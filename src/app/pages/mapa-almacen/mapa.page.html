<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #1a1a1a; color: white;">
    <ion-buttons slot="start">
      <ion-button routerLink="/welcome" color="light">
        <ion-icon name="arrow-back-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>VISOR DE <strong>ALMACÉN</strong></ion-title>
  </ion-toolbar>

  <ion-toolbar style="--background: #1a1a1a; padding: 0 10px 10px 10px;">
    <div class="search-box">
      <ion-icon name="search-outline"></ion-icon>
      <input type="text" placeholder="Buscar herramienta o código..." [(ngModel)]="searchTerm" (input)="filterItems()">
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="map-grid">
    
    <div class="rack-card" *ngFor="let shelf of estantes">
      <div class="rack-header" [style.border-top-color]="shelf.color">
        <span class="rack-name">ESTANTE {{ shelf.nombre }}</span>
      </div>

      <div class="rack-content">
        <div class="product-level" *ngFor="let p of shelf.productos">
          <div class="level-indicator">F{{ p.fila || '-' }}</div>
          
          <div class="product-info">
            <span class="p-title">{{ p.name }}</span>
            <span class="p-sub">{{ p.code }}</span>
          </div>

          <div class="p-stock-badge" [class.low]="p.stock < 5">
            {{ p.stock }} 
          </div>
        </div>

        <div *ngIf="shelf.productos.length === 0" class="empty-rack">
          <ion-icon name="cube-outline"></ion-icon>
          <p>DISPONIBLE</p>
        </div>
      </div>
    </div>

  </div>
</ion-content>
