<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Acceso Administrativo</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container">
    <ion-card class="animate__animated animate__fadeIn">
      <ion-card-header class="ion-text-center">
        <ion-icon name="hammer-outline" style="font-size: 48px; color: #00a8cc;"></ion-icon>
        <ion-card-title>Total Tools Admin</ion-card-title>
        <p style="color: #666; font-size: 0.8em;">Gestión de Inventario y Ventas</p>
      </ion-card-header>

      <ion-card-content>
        <ion-item lines="full">
          <ion-icon name="mail-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="stacked">Correo Electrónico</ion-label>
          <ion-input type="email" [(ngModel)]="email" placeholder="admin@totaltools.com"></ion-input>
        </ion-item>

        <ion-item lines="full">
          <ion-icon name="lock-closed-outline" slot="start" color="primary"></ion-icon>
          <ion-label position="stacked">Contraseña</ion-label>
          <ion-input type="password" [(ngModel)]="pass" placeholder="******"></ion-input>
        </ion-item>

        <ion-button expand="block" (click)="onLogin()" class="ion-margin-top" color="primary">
          <ion-icon name="log-in-outline" slot="start"></ion-icon>
          ENTRAR AL PANEL
        </ion-button>

        <div class="ion-text-center ion-margin-vertical">
          <hr style="opacity: 0.2;">
          <ion-note>¿ERES DEL PERSONAL DE ALMACÉN?</ion-note>
        </div>

        <ion-button expand="block" fill="outline" color="secondary" (click)="accederAlMapa()">
        <ion-icon name="map-outline" slot="start"></ion-icon>
        CONSULTAR UBICACIONES
       </ion-button>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
